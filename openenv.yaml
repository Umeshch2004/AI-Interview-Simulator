name: interview-env
version: 2.0.0
description: >
  AI Interview Simulator — an OpenEnv-compatible RL environment where an LLM agent
  acts as a technical interview candidate. The environment asks DSA, system design,
  and behavioral questions, evaluates answers using a hybrid Gemini + heuristic
  5-component reward function, and dynamically adjusts difficulty based on performance.
author: Umesh Chapala
tags:
  - interview
  - education
  - rl
  - nlp
  - adaptive
  - gemini
  - real-world

tasks:
  - id: easy
    grader: auto
    description: >
      Basic programming concepts — variables, data structures, functions.
      3 questions. No follow-ups. Good starting point for training.
    max_steps: 5

  - id: medium
    grader: auto
    description: >
      Algorithms, complexity analysis, debugging. 4 questions.
      Requires code examples for full marks. Moderate adaptive difficulty.
    max_steps: 8

  - id: hard
    grader: auto
    description: >
      Full interview — system design, advanced DSA, behavioral questions.
      5 questions + follow-up injection on partial scores (0.40–0.72).
      Dynamic difficulty adapts based on rolling 3-answer window.
    max_steps: 15

observation_space:
  question: string
  difficulty: string             # current adapted difficulty
  category: string               # dsa | system_design | behavioral | debugging
  question_number: integer
  total_questions: integer
  last_answer_feedback: string   # human-readable feedback from grader
  last_reward: float             # reward from previous step
  remaining_questions: integer
  follow_up_context: string      # null or context hint for follow-up questions
  performance_hint: string       # coaching hint based on rolling performance

action_space:
  answer: string                 # candidate's response to the interview question

reward_range: [0.001, 0.999]      # strictly between 0 and 1 (exclusive)

reward_components:
  semantic_correctness:
    weight: 0.40
    description: Gemini evaluates concept coverage vs expected_concepts
  depth_and_detail:
    weight: 0.20
    description: Local — length, code presence, examples
  relevance:
    weight: 0.20
    description: Gemini checks if answer stays on topic
  clarity:
    weight: 0.10
    description: Local — sentence structure, coherence heuristics
  followup_readiness:
    weight: 0.10
    description: Local — trade-off mentions, complexity analysis (hard mode only)