spec_version: 1
name: interview-env
version: "2.0.0"
description: >
  AI Interview Simulator, an OpenEnv-compatible reinforcement learning
  environment where an LLM agent answers technical interview questions across
  easy, medium, and hard tracks.
type: space
runtime: fastapi
app: server.app:app
port: 7860
author: Umesh Chapala
tags:
  - interview
  - education
  - rl
  - nlp
  - adaptive
  - openenv

tasks:
  - id: easy
    difficulty: easy
    description: >
      Basic programming concepts, Python fundamentals, and entry-level data
      structures. Three questions with no follow-ups.
    max_steps: 5
    grader: graders:grade_easy

  - id: medium
    difficulty: medium
    description: >
      Algorithms, complexity analysis, debugging, and implementation detail.
      Four questions with richer code-oriented grading.
    max_steps: 8
    grader: graders:grade_medium

  - id: hard
    difficulty: hard
    description: >
      Full interview with advanced DSA, system design, and behavioral
      reasoning. Five questions with follow-up injection on partial answers.
    max_steps: 15
    grader: graders:grade_hard

observation_space:
  question: string
  difficulty: string
  category: string
  question_number: integer
  total_questions: integer
  last_answer_feedback: string
  last_reward: float
  remaining_questions: integer
  follow_up_context: string
  performance_hint: string

action_space:
  answer: string

reward_range: [0.001, 0.999]

reward_components:
  semantic_correctness:
    weight: 0.40
    description: Concept coverage against expected concepts
  depth_and_detail:
    weight: 0.20
    description: Length, examples, and code presence
  relevance:
    weight: 0.20
    description: How directly the answer addresses the question
  clarity:
    weight: 0.10
    description: Structure and readability heuristics
  followup_readiness:
    weight: 0.10
    description: Trade-offs and complexity awareness in hard mode
